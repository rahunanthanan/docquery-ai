name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: docquery
          POSTGRES_PASSWORD: docquery
          POSTGRES_DB: docquery
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docquery"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest
        run: pytest

  frontend:
    name: Frontend · lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npx next lint
      - name: TypeScript
        run: npm run typecheck
      - name: Jest
        run: npm test

  docker:
    name: Docker · images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: docker build ./frontend
