services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docquery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docquery}
      POSTGRES_DB: ${POSTGRES_DB:-docquery}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docquery} -d ${POSTGRES_DB:-docquery}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docquery}:${POSTGRES_PASSWORD:-docquery}@db:5432/${POSTGRES_DB:-docquery}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
